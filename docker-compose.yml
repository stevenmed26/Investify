services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./apps
      dockerfile: api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      API_DB_HOST: postgres
      API_ML_INTERNAL_TOKEN: ${ML_INTERNAL_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ML_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      ML_DB_HOST: postgres
      ML_DB_PORT: 5432
      ML_DB_NAME: ${POSTGRES_DB}
      ML_DB_USER: ${POSTGRES_USER}
      ML_DB_PASSWORD: ${POSTGRES_PASSWORD}
      ML_INTERNAL_TOKEN: ${ML_INTERNAL_TOKEN}
    volumes:
      - ml_artifacts:/app/artifacts
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    env_file: .env
    environment:
      INTERNAL_API_BASE_URL: http://api:8080
      INTERNAL_ML_BASE_URL: http://ml-service:8000
      INTERNAL_ML_TOKEN: ${ML_INTERNAL_TOKEN}

volumes:
  postgres_data:
    driver: local
  ml_artifacts:
    driver: local
